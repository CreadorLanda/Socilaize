# Local stack for backend development.
#
# Postgres + Redis are required by the API. mautrix-whatsapp is included so
# the WhatsApp bridge can be exercised end-to-end on the same machine; it
# stays stopped until you `docker compose up mautrix`.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialize
      POSTGRES_PASSWORD: socialize
      POSTGRES_DB: socialize
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialize -d socialize"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # WhatsApp bridge sidecar. Opt-in (`docker compose up mautrix`).
  # See docs/tech/whatsapp-bridge.md for the link flow.
  mautrix:
    image: dock.mau.dev/mautrix/whatsapp:latest
    profiles: ["bridge"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mautrix-data:/data
    environment:
      MAUTRIX_LOG_LEVEL: info

volumes:
  postgres-data:
  redis-data:
  mautrix-data:
