# Local + VPS development stack.
#
# Targets two topologies with one file, via profiles:
#
#   1) Hybrid (recommended): Postgres on Supabase, everything else local.
#        docker compose up -d redis              # just Redis
#        docker compose --profile bridge up -d   # + Baileys sidecar
#
#   2) Fully local (offline dev): also runs Postgres locally.
#        docker compose --profile local-pg up -d
#
# See docs/tech/deployment.md for the full deployment story.

services:
  # Always available (no profile). Use it locally for dev OR on the VPS.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Opt-in: a local Postgres for offline development.
  # In hybrid topology this stays stopped — POSTGRES_URL points at Supabase.
  postgres:
    image: postgres:16-alpine
    profiles: ["local-pg"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialize
      POSTGRES_PASSWORD: socialize
      POSTGRES_DB: socialize
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialize -d socialize"]
      interval: 5s
      timeout: 3s
      retries: 10

  # WhatsApp bridge sidecar — Baileys wrapped in a small HTTP service.
  # The Go API talks to it on port 3001; the sidecar webhooks back into
  # the Go API on connection events. Persists per-user creds on a docker
  # volume so retries reuse the same identity (same key trick as Baileys'
  # useMultiFileAuthState).
  wa-bridge:
    profiles: ["bridge"]
    build:
      context: ../../wa-bridge
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - wa-bridge-auth:/app/auth_info
    environment:
      PORT: 3001
      # Both of these must match what the Go API uses.
      SOCIALIZE_INTERNAL_TOKEN: ${SOCIALIZE_INTERNAL_TOKEN:?missing SOCIALIZE_INTERNAL_TOKEN}
      # When mTLS is enabled, use the internal HTTPS port:
      SOCIALIZE_WEBHOOK_URL: ${SOCIALIZE_WEBHOOK_URL:-https://host.docker.internal:9090/api/internal/wa/events}
      LOG_LEVEL: info
      # mTLS client certs — must match the CA that signed the server cert.
      # Mounted from the host via the volume below.
      TLS_CA_CERT:      /app/certs/ca.pem
      TLS_CLIENT_CERT:  /app/certs/client.pem
      TLS_CLIENT_KEY:   /app/certs/client-key.pem
    volumes:
      - wa-bridge-auth:/app/auth_info
      - ../../certs:/app/certs:ro
    extra_hosts:
      # Lets the sidecar reach the Go API running on the host (dev only).
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  redis-data:
  wa-bridge-auth:
